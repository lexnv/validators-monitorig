<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validator Monitor</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #ffffff0a;
    --text: #e4e4ed;
    --text-dim: #7a7a8e;
    --accent: #e6007a;
    --accent-glow: #e6007a40;
    --green: #00e676;
    --green-glow: #00e67640;
    --red: #ff5252;
    --red-glow: #ff525240;
    --radius: 16px;
    --radius-sm: 10px;
  }

  html { scroll-behavior: smooth }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Animated background ── */
  .bg-glow {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  }
  .bg-glow .orb {
    position: absolute; border-radius: 50%; filter: blur(120px); opacity: .12;
    animation: orbFloat 20s ease-in-out infinite alternate;
  }
  .bg-glow .orb:nth-child(1) {
    width: 600px; height: 600px; background: var(--accent);
    top: -10%; left: -5%; animation-duration: 25s;
  }
  .bg-glow .orb:nth-child(2) {
    width: 500px; height: 500px; background: #6366f1;
    bottom: -10%; right: -5%; animation-duration: 30s; animation-delay: -5s;
  }
  .bg-glow .orb:nth-child(3) {
    width: 400px; height: 400px; background: #06b6d4;
    top: 40%; left: 50%; animation-duration: 22s; animation-delay: -10s;
  }
  @keyframes orbFloat {
    0%   { transform: translate(0, 0) scale(1) }
    33%  { transform: translate(60px, -40px) scale(1.1) }
    66%  { transform: translate(-40px, 60px) scale(.9) }
    100% { transform: translate(30px, -30px) scale(1.05) }
  }

  /* ── Layout ── */
  .app { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 32px 24px 80px; }

  /* ── Header ── */
  .header {
    text-align: center; margin-bottom: 48px;
    animation: fadeUp .8s cubic-bezier(.16,1,.3,1) both;
  }
  .header h1 {
    font-size: 2.2rem; font-weight: 700; letter-spacing: -.03em;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p { color: var(--text-dim); font-size: .95rem; margin-top: 6px; }

  /* ── Tabs ── */
  .tabs {
    display: flex; justify-content: center; gap: 6px;
    margin-bottom: 40px; flex-wrap: wrap;
    animation: fadeUp .8s cubic-bezier(.16,1,.3,1) .1s both;
  }
  .tab {
    position: relative; padding: 10px 28px; border-radius: 999px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-dim); font-size: .875rem; font-weight: 500;
    cursor: pointer; transition: all .35s cubic-bezier(.16,1,.3,1);
    overflow: hidden; user-select: none;
  }
  .tab::before {
    content: ''; position: absolute; inset: 0; border-radius: 999px;
    background: linear-gradient(135deg, var(--accent), #6366f1);
    opacity: 0; transition: opacity .35s ease;
  }
  .tab span { position: relative; z-index: 1; }
  .tab:hover { border-color: #ffffff15; color: var(--text); transform: translateY(-1px); }
  .tab.active {
    border-color: transparent; color: #fff;
    box-shadow: 0 4px 24px var(--accent-glow);
  }
  .tab.active::before { opacity: 1 }

  /* ── Stats bar ── */
  .stats {
    display: flex; justify-content: center; gap: 32px; margin-bottom: 36px;
    animation: fadeUp .8s cubic-bezier(.16,1,.3,1) .2s both;
  }
  .stat {
    display: flex; align-items: center; gap: 8px;
    font-size: .85rem; color: var(--text-dim);
    cursor: pointer; padding: 6px 14px; border-radius: 999px;
    border: 1px solid transparent;
    transition: all .3s cubic-bezier(.16,1,.3,1); user-select: none;
  }
  .stat:hover { background: #ffffff08; border-color: var(--border); }
  .stat.active { background: #ffffff0c; border-color: #ffffff18; color: var(--text); }
  .stat .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .stat .dot.green { background: var(--green); box-shadow: 0 0 8px var(--green-glow); }
  .stat .dot.red   { background: var(--red);   box-shadow: 0 0 8px var(--red-glow);   }
  .stat strong { color: var(--text); font-weight: 600; }

  /* ── Search ── */
  .search-wrap {
    max-width: 480px; margin: 0 auto 32px; position: relative;
    animation: fadeUp .8s cubic-bezier(.16,1,.3,1) .25s both;
  }
  .search-wrap svg {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    color: var(--text-dim); width: 18px; height: 18px;
  }
  .search {
    width: 100%; padding: 12px 16px 12px 44px; border-radius: 999px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-size: .9rem; outline: none;
    transition: border-color .3s, box-shadow .3s;
  }
  .search::placeholder { color: var(--text-dim) }
  .search:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow);
  }

  /* ── Validator list ── */
  .validator-list {
    display: flex; flex-direction: column; gap: 12px;
  }

  /* ── Card ── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px 24px;
    transition: all .35s cubic-bezier(.16,1,.3,1);
    animation: fadeUp .6s cubic-bezier(.16,1,.3,1) both;
    cursor: default;
  }
  .card:hover {
    border-color: #ffffff12; background: var(--surface2);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px #00000040;
  }

  .card-top {
    display: flex; align-items: center; gap: 14px; margin-bottom: 14px;
  }

  /* Status bubble */
  .status-bubble {
    width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
    position: relative;
  }
  .status-bubble::after {
    content: ''; position: absolute; inset: -3px; border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  .status-bubble.online {
    background: var(--green); box-shadow: 0 0 10px var(--green-glow);
  }
  .status-bubble.online::after { border: 2px solid var(--green); }
  .status-bubble.offline {
    background: var(--red); box-shadow: 0 0 10px var(--red-glow);
  }
  .status-bubble.offline::after { border: 2px solid var(--red); }

  @keyframes pulse {
    0%, 100% { opacity: .6; transform: scale(1) }
    50%      { opacity: 0;  transform: scale(1.8) }
  }

  .identity {
    font-weight: 600; font-size: 1rem; color: var(--text);
  }
  .status-label {
    margin-left: auto; font-size: .75rem; font-weight: 600;
    padding: 4px 12px; border-radius: 999px; letter-spacing: .03em;
    text-transform: uppercase;
  }
  .status-label.online {
    background: #00e67615; color: var(--green);
  }
  .status-label.offline {
    background: #ff525215; color: var(--red);
  }

  .fields { display: grid; gap: 10px; }

  .field {
    display: flex; gap: 10px; align-items: baseline;
    font-size: .82rem;
  }
  .field-label {
    color: var(--text-dim); min-width: 90px; flex-shrink: 0;
    font-weight: 500; text-transform: uppercase; font-size: .7rem;
    letter-spacing: .06em; padding-top: 2px;
  }
  .field-value {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: .78rem; color: #b0b0c4; word-break: break-all;
  }

  .multiaddr-list {
    display: flex; flex-direction: column; gap: 4px;
  }
  .multiaddr {
    display: inline-block; padding: 3px 10px; border-radius: 6px;
    background: #ffffff06; border: 1px solid var(--border);
    font-size: .75rem; transition: background .2s;
  }
  .multiaddr:hover { background: #ffffff0d }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px) }
    to   { opacity: 1; transform: translateY(0) }
  }

  /* ── Empty state ── */
  .empty {
    text-align: center; padding: 64px 24px; color: var(--text-dim);
    animation: fadeUp .6s cubic-bezier(.16,1,.3,1) both;
  }
  .empty svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: .3; }
  .empty p { font-size: .95rem; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .app { padding: 20px 16px 60px; }
    .header h1 { font-size: 1.6rem }
    .tabs { gap: 4px }
    .tab { padding: 8px 18px; font-size: .8rem }
    .card { padding: 16px }
    .stats { gap: 20px; flex-wrap: wrap }
    .field { flex-direction: column; gap: 2px }
    .field-label { min-width: auto }
  }
</style>
</head>
<body>

<div class="bg-glow">
  <div class="orb"></div>

// ── State ──
let activeNetwork = 'Polkadot';
let searchQuery = '';
let statusFilter = null; // null = all, 'online' = reachable first, 'offline' = unreachable first

// ── Render helpers ──
function truncate(str, start = 8, end = 6) {
  if (str.length <= start + end + 3) return str;
  return str.slice(0, start) + '…' + str.slice(-end);
}

function renderTabs() {
  const container = document.getElementById('tabs');
  container.innerHTML = Object.keys(NETWORKS).map(name =>
    `<button class="tab${name === activeNetwork ? ' active' : ''}" data-network="${name}"><span>${name}</span></button>`
  ).join('');
}

function renderStats() {
  const validators = NETWORKS[activeNetwork];
  const online = validators.filter(v => v.reachable).length;
  const offline = validators.length - online;
  document.getElementById('stats').innerHTML = `
    <div class="stat${statusFilter === null ? ' active' : ''}" data-filter="all"><strong>${validators.length}</strong> all</div>
    <div class="stat${statusFilter === 'online' ? ' active' : ''}" data-filter="online"><div class="dot green"></div><strong>${online}</strong> reachable</div>
    <div class="stat${statusFilter === 'offline' ? ' active' : ''}" data-filter="offline"><div class="dot red"></div><strong>${offline}</strong> unreachable</div>
  `;
}

function renderList() {
  const container = document.getElementById('list');
  const validators = NETWORKS[activeNetwork];
  const q = searchQuery.toLowerCase();

  let filtered = validators.filter(v =>
    !q ||
    v.identity.toLowerCase().includes(q) ||
    v.key.toLowerCase().includes(q) ||
    v.peerId.toLowerCase().includes(q)
  );

  if (statusFilter === 'offline') {
    filtered = [...filtered].sort((a, b) => a.reachable - b.reachable);
  } else if (statusFilter === 'online') {
    filtered = [...filtered].sort((a, b) => b.reachable - a.reachable);
  }

  if (!filtered.length) {
    container.innerHTML = `
      <div class="empty">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
        </svg>
        <p>No validators match your search</p>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map((v, i) => `
    <div class="card" style="animation-delay: ${i * .06}s">
      <div class="card-top">
        <div class="status-bubble ${v.reachable ? 'online' : 'offline'}"></div>
        <div class="identity">${v.identity}</div>
        <div class="status-label ${v.reachable ? 'online' : 'offline'}">${v.reachable ? 'Reachable' : 'Unreachable'}</div>
      </div>
      <div class="fields">
        <div class="field">
          <div class="field-label">Key</div>
          <div class="field-value">${v.key}</div>
        </div>
        <div class="field">
          <div class="field-label">Peer ID</div>
          <div class="field-value">${v.peerId}</div>
        </div>
        <div class="field">
          <div class="field-label">Addresses</div>
          <div class="field-value">
            <div class="multiaddr-list">
              ${v.multiaddresses.map(a => `<span class="multiaddr">${a}</span>`).join('')}
            </div>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function render() {
  renderTabs();
  renderStats();
  renderList();
}

// ── Events ──
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  activeNetwork = tab.dataset.network;
  render();
});

document.getElementById('stats').addEventListener('click', e => {
  const stat = e.target.closest('.stat');
  if (!stat) return;
  const filter = stat.dataset.filter;
  if (filter === 'all') statusFilter = null;
  else if (statusFilter === filter) statusFilter = null; // toggle off
  else statusFilter = filter;
  renderStats();
  renderList();
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderList();
});

// ── Init ──
render();
</script>
</body>
</html>
