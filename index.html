<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validator Monitor Pro // System Alpha</title>
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #030305;
    --surface: rgba(15, 15, 26, 0.7);
    --surface-hover: rgba(25, 25, 45, 0.85);
    --border: rgba(255, 255, 255, 0.05);
    --border-active: rgba(230, 0, 122, 0.5);
    --text: #f0f0f5;
    --text-dim: #7d7d8f;
    --accent: #e6007a;
    --accent-glow: rgba(230, 0, 122, 0.4);
    --green: #00ffa3;
    --green-glow: rgba(0, 255, 163, 0.3);
    --red: #ff3e3e;
    --red-glow: rgba(255, 62, 62, 0.3);
    --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    --font-sans: 'Inter', -apple-system, sans-serif;
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── High-Tech Background ── */
  .bg-canvas {
    position: fixed; inset: 0; z-index: -1;
    background: 
      radial-gradient(circle at 50% 0%, #1a0b16 0%, #030305 70%),
      linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
      linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
    background-size: 100% 100%, 100% 4px, 3px 100%;
  }

  .grid-overlay {
    position: fixed; inset: 0; z-index: -1;
    background-image: 
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(circle at 50% 50%, black, transparent 80%);
    opacity: 0.3;
  }

  .scanline {
    position: fixed; inset: 0; z-index: 100;
    background: linear-gradient(to bottom, transparent, rgba(230, 0, 122, 0.03) 50%, transparent);
    background-size: 100% 100px;
    animation: scan 8s linear infinite;
    pointer-events: none;
    opacity: 0.5;
  }

  @keyframes scan { from { transform: translateY(-100%); } to { transform: translateY(100vh); } }

  /* ── Layout ── */
  .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; position: relative; }
  
  /* ── Header ── */
  .header { margin-bottom: 48px; position: relative; }
  .header h1 { 
    font-size: 2.8rem; font-weight: 900; letter-spacing: -0.05em; 
    text-transform: uppercase; margin-bottom: 4px;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 10px var(--accent-glow));
  }
  .header .sys-status {
    font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.2em; border-left: 2px solid var(--accent);
    padding-left: 10px; margin-bottom: 12px;
  }

  /* ── Controls Row ── */
  .controls-row {
    display: flex; flex-direction: column; gap: 20px; margin-bottom: 32px;
    background: rgba(255, 255, 255, 0.02); padding: 20px; border-radius: 4px;
    border: 1px solid var(--border); backdrop-filter: blur(10px);
  }
  
  .search-input {
    width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border);
    padding: 14px 14px 14px 48px; border-radius: 4px; color: #fff;
    font-size: 0.9rem; font-family: var(--font-mono); outline: none; transition: 0.2s;
  }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

  .filter-group { display: flex; gap: 12px; align-items: center; justify-content: space-between; flex-wrap: wrap; }

  /* ── High Tech Buttons ── */
  .tabs { display: flex; gap: 4px; padding: 4px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); }
  .tab-btn {
    padding: 8px 24px; border: none; background: transparent; color: var(--text-dim);
    cursor: pointer; font-size: 0.75rem; font-family: var(--font-mono); font-weight: 600;
    text-transform: uppercase; transition: 0.3s;
  }
  .tab-btn.active { background: var(--accent); color: white; clip-path: polygon(0 0, 90% 0, 100% 100%, 0% 100%); }

  .action-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text);
    padding: 10px 18px; border-radius: 2px; cursor: pointer; display: flex; align-items: center; gap: 8px;
    font-size: 0.75rem; font-family: var(--font-mono); text-transform: uppercase; transition: 0.2s;
  }
  .action-btn:hover { border-color: var(--accent); background: rgba(230,0,122,0.1); color: var(--accent); }

  /* ── Stats Summary ── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); padding: 20px;
    position: relative; transition: 0.3s; overflow: hidden; cursor: pointer;
  }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
    background: var(--text-dim); opacity: 0.3;
  }
  .stat-card:hover { border-color: var(--accent); }
  .stat-card.active { border-color: var(--accent); background: rgba(230, 0, 122, 0.05); }
  .stat-card.active::before { background: var(--accent); opacity: 1; }

  .stat-card.info {
    cursor: default; background: transparent; border-style: dashed; border-color: rgba(255,255,255,0.06);
  }
  .stat-card.info::before { background: var(--text-dim); opacity: 0.15; }
  .stat-card.info:hover { border-color: rgba(255,255,255,0.06); }
  .stat-card.info .stat-value { font-size: 1.5rem; font-weight: 600; opacity: 0.7; }
  .stat-card.info .stat-label { opacity: 0.5; }
  
  .stat-label { color: var(--text-dim); font-size: 0.65rem; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.1em; }
  .stat-value { font-size: 2rem; font-weight: 800; font-family: var(--font-mono); }

  /* ── Validator List ── */
  .list-container { display: flex; flex-direction: column; gap: 16px; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    padding: 24px; position: relative; backdrop-filter: blur(12px);
    transition: transform 0.2s, border-color 0.2s;
    /* Cyber notch effect */
    clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
  }
  .card:hover { border-color: var(--accent); background: var(--surface-hover); }

  /* Corner Brackets for high-tech feel */
  .card::after {
    content: ''; position: absolute; top: 10px; right: 10px; width: 15px; height: 15px;
    border-top: 2px solid var(--accent); border-right: 2px solid var(--accent); opacity: 0; transition: 0.3s;
  }
  .card:hover::after { opacity: 1; top: 5px; right: 5px; }

  .card-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
  
  .pulse {
    width: 12px; height: 12px; border-radius: 50%; position: relative;
  }
  .pulse.online { background: var(--green); box-shadow: 0 0 10px var(--green); }
  .pulse.online::after {
    content: ''; position: absolute; inset: -4px; border-radius: 50%;
    border: 2px solid var(--green); animation: pulse-ring 1.5s infinite;
  }
  .pulse.offline { background: var(--red); box-shadow: 0 0 10px var(--red); }

  @keyframes pulse-ring { 0% { transform: scale(0.7); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
  
  .identity-name { font-weight: 800; font-size: 1.1rem; flex: 1; letter-spacing: -0.02em; text-transform: uppercase; color: #fff; }
  
  .badge {
    font-family: var(--font-mono); font-size: 0.6rem; padding: 4px 10px; border-radius: 2px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  }

  /* ── Fields ── */
  .fields { display: grid; gap: 16px; }
  .field-label { font-size: 0.6rem; color: var(--accent); font-family: var(--font-mono); text-transform: uppercase; margin-bottom: 4px; display: block; }
  .field-value-wrap { 
    display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.4);
    padding: 8px 16px; border-left: 3px solid var(--border); transition: 0.3s;
  }
  .card:hover .field-value-wrap { border-left-color: var(--accent); }
  .field-value { font-family: var(--font-mono); font-size: 0.8rem; color: #a1a1b5; word-break: break-all; }

  /* ── Multiaddresses ── */
  .addr-chip {
    display: flex; align-items: center; gap: 8px; padding: 6px 12px;
    background: rgba(0,0,0,0.3); border: 1px solid var(--border);
    font-size: 0.7rem; font-family: var(--font-mono); margin-bottom: 4px;
  }
  .addr-chip.ok { border-left: 2px solid var(--green); }
  .addr-chip.fail { border-left: 2px solid var(--red); opacity: 0.6; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 30px; right: 30px; background: var(--accent);
    color: #fff; padding: 12px 24px; font-family: var(--font-mono); font-weight: 700;
    clip-path: polygon(0 0, 100% 0, 100% 70%, 90% 100%, 0 100%);
    transform: translateX(120%); transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 1000;
  }
  #toast.show { transform: translateX(0); }

  .last-updated { 
    text-align: right; color: var(--text-dim); font-size: 0.65rem; font-family: var(--font-mono);
    margin-top: 10px; opacity: 0.6;
  }
</style>
</head>
<body>

<div class="bg-canvas"></div>
<div class="grid-overlay"></div>
<div class="scanline"></div>

<div class="container">
  <header class="header">
    <div class="sys-status">System Node Monitoring // Live Feedback</div>
    <h1>Validator Monitor <span style="color:var(--accent)">Pro</span></h1>
    <div id="update-ts" class="last-updated"></div>
  </header>

  <div class="controls-row">
    <div style="position: relative;">
      <input type="text" id="search-input" class="search-input" placeholder="> TERMINAL_SEARCH: [IDENT / KEY / ADDR]">
    </div>

    <div class="filter-group">
      <nav class="tabs" id="network-tabs"></nav>
      
      <div style="display: flex; gap: 8px;">
        <button class="action-btn" id="sort-toggle">
          SORT: <span id="sort-label">HEALTH</span>
        </button>
        <button class="action-btn" id="view-toggle">
          MODE: <span id="view-label">FULL</span>
        </button>
        <button class="action-btn" id="download-btn">EXPORT_JSON</button>
      </div>
    </div>
  </div>

  <div class="stats-grid" id="stats-summary"></div>

  <div id="list" class="list-container"></div>
</div>

<div id="toast">DATA_COPIED_TO_CLIPBOARD</div>

<script>
const state = {
  networks: {},
  activeNetwork: '',
  searchQuery: '',
  statusFilter: 'all',
  viewMode: 'full',
  sortBy: 'status'
};

const ICON_COPY = `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M8 4v8a2 2 0 002 2h6a2 2 0 002-2V4a2 2 0 00-2-2h-6a2 2 0 00-2 2z"></path><path d="M16 18v2a2 2 0 01-2 2H6a2 2 0 01-2-2V9a2 2 0 012-2h2"></path></svg>`;

async function init() {
  try {
    const res = await fetch('networks.json');
    const files = await res.json();
    const results = await Promise.allSettled(files.map(f => fetch(f).then(r => r.json())));

    results.forEach((res, idx) => {
      if (res.status === 'fulfilled' && res.value.chain) {
        const data = res.value;
        const name = data.chain.toUpperCase();
        state.networks[name] = {
          validators: processValidators(data.authorities),
          stats: data.stats || {},
          timestamp: data.timestamp || new Date().toISOString(),
          raw: data
        };
      }
    });

    const preferredOrder = ['POLKADOT', 'KUSAMA', 'PASEO', 'WESTEND'];
    const networkNames = Object.keys(state.networks).sort((a, b) => {
      const ia = preferredOrder.indexOf(a), ib = preferredOrder.indexOf(b);
      if (ia !== -1 && ib !== -1) return ia - ib;
      if (ia !== -1) return -1;
      if (ib !== -1) return 1;
      return a.localeCompare(b);
    });
    const ordered = {};
    networkNames.forEach(n => ordered[n] = state.networks[n]);
    state.networks = ordered;
    if (networkNames.length > 0) state.activeNetwork = networkNames[0];
    render();
  } catch (err) {
    console.error(err);
    document.getElementById('list').innerHTML = `<div style="font-family:var(--font-mono); color:var(--red);">CRITICAL_ERROR: FAILED_TO_FETCH_NETWORKS</div>`;
  }
}

function processValidators(authorities) {
  return authorities.map(auth => ({
    key: auth.authority_ss58,
    peerId: auth.peer_id || '',
    identity: auth.identity_name || '',
    agent: auth.agent_version || 'Unknown',
    hasDht: auth.has_dht_record,
    addresses: (auth.addresses || []).map(a => ({
      full: a.address_short,
      isOk: a.result?.status === 'Ok',
      reason: a.result?.reason || ''
    })),
    isOnline: auth.addresses?.some(a => a.result?.status === 'Ok')
  }));
}

function copy(text) {
  const textArea = document.createElement("textarea");
  textArea.value = text;
  document.body.appendChild(textArea);
  textArea.select();
  document.execCommand('copy');
  document.body.removeChild(textArea);
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function render() {
  const net = state.networks[state.activeNetwork];
  if (!net) return;

  // Render Tabs
  document.getElementById('network-tabs').innerHTML = Object.keys(state.networks).map(name => `
    <button class="tab-btn ${state.activeNetwork === name ? 'active' : ''}" onclick="switchNetwork('${name}')">${name}</button>
  `).join('');

  // Render Stats
  const v = net.validators;
  const s = net.stats;
  const online = v.filter(i => i.isOnline).length;
  let statsHtml = `
    <div class="stat-card ${state.statusFilter === 'all' ? 'active' : ''}" onclick="setStatusFilter('all')">
      <div class="stat-label">Total Nodes</div>
      <div class="stat-value">${v.length}</div>
    </div>
    <div class="stat-card ${state.statusFilter === 'online' ? 'active' : ''}" onclick="setStatusFilter('online')">
      <div class="stat-label">Reachable</div>
      <div class="stat-value" style="color:var(--green)">${online}</div>
    </div>
    <div class="stat-card ${state.statusFilter === 'offline' ? 'active' : ''}" onclick="setStatusFilter('offline')">
      <div class="stat-label">Unreachable</div>
      <div class="stat-value" style="color:var(--red)">${v.length - online}</div>
    </div>
  `;
  if (s.with_dht_records != null) statsHtml += `
    <div class="stat-card info">
      <div class="stat-label">DHT Records</div>
      <div class="stat-value">${s.with_dht_records}</div>
    </div>`;
  if (s.identified != null) statsHtml += `
    <div class="stat-card info">
      <div class="stat-label">Identified</div>
      <div class="stat-value">${s.identified}</div>
    </div>`;
  if (s.total_addresses != null) statsHtml += `
    <div class="stat-card info">
      <div class="stat-label">Addrs Reachable</div>
      <div class="stat-value">${s.reachable_public}<span style="font-size:1rem;color:var(--text-dim)">/${s.total_addresses}</span></div>
    </div>`;
  if (s.fully_reachable_authorities != null) statsHtml += `
    <div class="stat-card info">
      <div class="stat-label">Fully Reachable</div>
      <div class="stat-value" style="color:var(--green)">${s.fully_reachable_authorities}</div>
    </div>`;
  document.getElementById('stats-summary').innerHTML = statsHtml;

  document.getElementById('update-ts').textContent = `LAST_SYNC: ${new Date(net.timestamp).toLocaleString()}`;
  renderList();
}

function renderList() {
  const net = state.networks[state.activeNetwork];
  const container = document.getElementById('list');
  let filtered = net.validators.filter(v => {
    const q = state.searchQuery.toLowerCase();
    const matchSearch = !q || v.identity.toLowerCase().includes(q) || v.key.toLowerCase().includes(q) || v.peerId.toLowerCase().includes(q) || v.agent.toLowerCase().includes(q) || v.addresses.some(a => a.full.toLowerCase().includes(q));
    const matchFilter = state.statusFilter === 'all' || (state.statusFilter === 'online' ? v.isOnline : !v.isOnline);
    return matchSearch && matchFilter;
  });

  filtered.sort((a, b) => {
    if (state.sortBy === 'status') return a.isOnline === b.isOnline ? 0 : (a.isOnline ? 1 : -1);
    return (a.identity || a.key).localeCompare(b.identity || b.key);
  });

  container.innerHTML = filtered.map((v, i) => `
    <div class="card" style="animation: slideIn 0.3s ease-out both ${i * 0.02}s">
      <div class="card-header">
        <div class="pulse ${v.isOnline ? 'online' : 'offline'}"></div>
        <div class="identity-name">${v.identity || shorten(v.key, 12)}</div>
        <div class="badge">${v.hasDht ? 'DHT: OK' : 'DHT: NONE'}</div>
      </div>
      
      <div class="fields" style="${state.viewMode === 'compact' ? 'display:none' : ''}">
        <div class="field">
          <span class="field-label">Authority_Key</span>
          <div class="field-value-wrap">
            <span class="field-value">${v.key}</span>
            <button class="action-btn" style="padding:4px" onclick="copy('${v.key}')">${ICON_COPY}</button>
          </div>
        </div>

        <div class="field">
          <span class="field-label">Peer_Identifier</span>
          <div class="field-value-wrap">
            <span class="field-value">${v.peerId || '---'}</span>
            ${v.peerId ? `<button class="action-btn" style="padding:4px" onclick="copy('${v.peerId}')">${ICON_COPY}</button>` : ''}
          </div>
        </div>

        ${v.agent && v.agent !== 'Unknown' ? `<div class="field">
          <span class="field-label">Agent_Version</span>
          <div class="field-value-wrap">
            <span class="field-value">${v.agent}</span>
          </div>
        </div>` : ''}

        <div class="field">
          <span class="field-label">Advertised_Endpoints [${v.addresses.length}]</span>
          <div class="addr-grid" style="display:flex; flex-wrap:wrap; gap:8px;">
            ${v.addresses.map(a => `
              <div class="addr-chip ${a.isOk ? 'ok' : 'fail'}">
                <span>${a.full}</span>
                <button class="action-btn" style="padding:2px; border:none;" onclick="copy('${a.full}')">${ICON_COPY}</button>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

window.switchNetwork = (n) => { state.activeNetwork = n; render(); };
window.setStatusFilter = (f) => { state.statusFilter = f; render(); };

document.getElementById('search-input').addEventListener('input', e => { state.searchQuery = e.target.value; renderList(); });

document.getElementById('view-toggle').addEventListener('click', () => {
  state.viewMode = state.viewMode === 'full' ? 'compact' : 'full';
  document.getElementById('view-label').textContent = state.viewMode.toUpperCase();
  renderList();
});

document.getElementById('sort-toggle').addEventListener('click', () => {
  state.sortBy = state.sortBy === 'status' ? 'name' : 'status';
  document.getElementById('sort-label').textContent = state.sortBy === 'status' ? 'HEALTH' : 'NAME';
  renderList();
});

document.getElementById('download-btn').addEventListener('click', () => {
  const data = state.networks[state.activeNetwork]?.raw;
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${state.activeNetwork}_REPORT.json`;
  a.click();
});

function shorten(s, l=8) { return s.length <= l*2 ? s : s.slice(0,l)+'...'+s.slice(-l); }

init();
</script>

<style>
@keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
</style>

</body>
</html>
